name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-demo
    steps:
      - uses: actions/checkout@v4

      # Auto-enable GitHub Pages for this repo if it isn't already.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app-demo/package-lock.json

      - run: npm ci

      - run: npm run build

      # Stop GitHub Pages from running Jekyll (it would drop the _next folder).
      - run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app-demo/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
